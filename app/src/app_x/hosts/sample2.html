      ].map((e) => atob(e.split("").reverse("").join(""))))

  <body style="margin: 0; padding: 0; overflow-y: hidden; background: #000">
    <iframe
      src="https://pooembed.eu/embed-noads/march-madness/7263/7263-miz"
      frameborder="0"
      style="
        overflow: hidden;
        overflow-x: hidden;
        overflow-y: hidden;
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      "
      height="100%"
      width="100%"
      allowfullscreen
      scrolling="no"
      allowtransparency
    ></iframe>
    <script>
      (() => {
        let a = () => {
          document.body.insertAdjacentHTML(
            "beforeend",
            '<iframe style="visibility:hidden"id="close"width="1"height="1"scrolling="no"frameborder="0"src="/ad.html"></iframe>',
          );
          setTimeout(() => {
            document.querySelector("#close").remove();
          }, 9000);
          setTimeout(() => {
            document.querySelector("#close").remove();
          }, 9000);
          setTimeout(a, 600000);
        };
        a();
      })();
      (() => {
        if (window.location.hash) {
          document.querySelector("iframe").src += "?" + window.location.hash;
        }
        const split = window.location.pathname.split("/");
        const channelId = btoa(
          `embedme-${split[2]}-${split[3]}-${split[4]}%7C%5B8%5D`,
        );
        fetch("https://ann.cdn-lab.shop/v1/channel", {
          method: "POST",
          body: JSON.stringify({ channel: channelId }),
        })
          .then((r) => r.json())
          .then((r) => {
            const interval = r.data.report_interval * 1000;
            setInterval(() => {
              fetch(
                `https://ann.cdn-lab.shop/v1/channel/${channelId}/node/${r.data.id}/stats`,
                {
                  method: "POST",
                  body: JSON.stringify({
                    totalConns: 0,
                    p2p: 0,
                    share: 0,
                    http: 1,
                  }),
                },
              ).catch(() => {});
            }, interval);
          });
      })();
