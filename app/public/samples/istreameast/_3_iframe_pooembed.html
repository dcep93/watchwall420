<!DOCTYPE html>
<html lang="en">

<head>
    <base href="https://pooembed.eu/embed-noads/march-madness/2026-03-21/tcu-duke" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

</head>

<body style="
      margin: 0;
      padding: 0;
      overflow-y: hidden;
      background: #000;
      height: 100vh;
      width: 100vw;
      color: red;
      text-align: center;
      font-size: 2rem;
      font-family: Arial;
      background: #000;
    ">
    <div id="player" style="height: 100vh; width: 100vw"></div>
    <script>
        (function () {
            var s = document.createElement("script");
            var params = new URLSearchParams(
                document.location.hash.split("#").slice(1).join("&")
            );
            var player = params.get("player") || "jw";
            s.setAttribute(
                "src",
                player === "clappr" ? "/js/bundle.js" : "/js/bundle-jw.js"
            );
            document.body.appendChild(s);
        })();
    </script>
</body>

</html>
